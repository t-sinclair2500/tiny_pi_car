[campaign]
name = "perception-latency-night"
objective = "Maximize night_perception_eval score: lower camera+Hailo e2e latency_p50 (no wheel motion)."
program = "autoresearch/car/program.md"
editable_paths = [
  "playground/vision/**",
  "playground/experiments/perception/**",
  "playground/autoresearch/**",
  "autoresearch/car/**",
  "scripts/hailo_ab_compare.py",
  "scripts/night_perception_eval.py",
  "scripts/vision_suite_*.py",
]
# Fixed scalar: 100 * (budget - latency_p50) / (budget - floor); dets not scored.
eval_command = [
  "{python}", "scripts/night_perception_eval.py",
  "--host", "rpicarbox.local",
  "--remote-root", "/home/tyler/Desktop/tiny_pi_car",
  "--frames", "15",
  "--budget-ms", "500",
  "--floor-ms", "50",
  "--json",
]
metric_key = "score"
hard_gate_key = "hard_gates_passed"
maximize = true
min_delta = 0.5
eval_timeout_s = 240
